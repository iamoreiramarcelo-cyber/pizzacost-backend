services:
  pizzacost-api:
    build: .
    container_name: pizzacost-api
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8020:8000"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - turismo-net

networks:
  turismo-net:
    external: true
